# MBA Path Pro — Nginx site config (Hostinger VPS / Ubuntu 22.04)
# Install: sudo cp deploy/nginx/mbapathpro.conf /etc/nginx/sites-available/mbapathpro
# Enable:  sudo ln -sf /etc/nginx/sites-available/mbapathpro /etc/nginx/sites-enabled/
# Test:    sudo nginx -t && sudo systemctl reload nginx
#
# Replace MY_DOMAIN with your actual domain before deploying.

# Redirect HTTP → HTTPS (enable after certbot)
server {
    listen 80;
    listen [::]:80;
    server_name MY_DOMAIN www.MY_DOMAIN;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name MY_DOMAIN www.MY_DOMAIN;

    # Certbot fills these paths after: certbot certonly --nginx -d MY_DOMAIN -d www.MY_DOMAIN
    ssl_certificate     /etc/letsencrypt/live/MY_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/MY_DOMAIN/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers (Helmet also sets some on API responses)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    root /var/www/mbapathpro/frontend/dist;
    index index.html;

    # Match backend MAX_FILE_SIZE (5MB default) + headroom
    client_max_body_size 10M;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # API reverse proxy
    location /api/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # Uploaded files (documents, college logos, invoices)
    location /uploads/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Health check (monitoring / uptime)
    location /health {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        access_log off;
    }

    # SPA — React Router
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
